# Docker Compose for local development
# NOTE: PostgreSQL is hosted on Neon — this compose file is optional for running
# the app containers locally. Set DATABASE_URL in .env to your Neon connection string.

version: "3.9"

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - ./server/.env
    command: npm run dev

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - ./client/.env
    command: npm run dev -- --host

